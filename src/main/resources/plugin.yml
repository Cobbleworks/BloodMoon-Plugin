name: BloodMoon-Event
version: 1.0.0
main: com.yourname.bloodmoon.BloodMoonPlugin
api-version: '1.20'
author: Cobbleworks
depend:
  - Citizens
  - Sentinel
commands:
  bloodmoon:
    description: Manage the Blood Moon event.
    usage: /bloodmoon <healthbar|start|stop|status|spawn|reload|chance> (spawn: vampire|clown)
    aliases:
      - bm
permissions:
  bloodmoon.admin:
    description: Allows full Blood Moon administration.
    default: op
  bloodmoon.healthbar:
    description: Allows players to show the nearest vampire health bar.
    default: true
  bloodmoon.notify:
    description: Allows receiving Blood Moon notifications.
    default: true
